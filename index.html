<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <title>All AE/JE Exams - Civil Engineering</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="screen active">
    <div class="login-card">
      <div class="logo">📘</div>
      <h1>All AE/JE Exams</h1>
      <p class="tagline">Civil Engineering</p>
      <p class="subtitle">UPPSC AE Preparation Hub</p>
      <button id="googleLoginBtn" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        Continue with Google
      </button>
      <p class="footer-note">Free questions available • Premium coming soon</p>
    </div>
  </div>

  <!-- HOME SCREEN -->
  <div id="homeScreen" class="screen">
    <header class="app-header">
      <div class="header-left">
        <h2>UPPSC AE</h2>
        <span class="header-sub">Civil Engineering</span>
      </div>
      <div class="header-right">
        <img id="userAvatar" class="avatar" alt="" />
        <button id="logoutBtn" class="btn-icon" title="Logout">⏻</button>
      </div>
    </header>

    <div class="welcome-strip">
      <p>Welcome, <span id="userName">student</span> 👋</p>
    </div>

    <main class="home-main">
      <h3>Choose a section</h3>
      <div class="card-grid">
        <button class="feature-card" data-route="subjects">
          <div class="card-icon">📚</div>
          <div class="card-title">Subjects</div>
          <div class="card-desc">Topic-wise practice</div>
        </button>
        <button class="feature-card" data-route="pyq">
          <div class="card-icon">📝</div>
          <div class="card-title">Previous Year Papers</div>
          <div class="card-desc">2020, 2022, 2024</div>
        </button>
        <button class="feature-card" data-route="mock">
          <div class="card-icon">⏱️</div>
          <div class="card-title">Mock Tests</div>
          <div class="card-desc">Full-length tests</div>
        </button>
        <button class="feature-card" data-route="bookmarks">
          <div class="card-icon">⭐</div>
          <div class="card-title">Bookmarks</div>
          <div class="card-desc">Saved questions</div>
        </button>
      </div>

      <div class="status-card" id="statusCard">
        <div class="status-row">
          <span class="status-label">Questions loaded</span>
          <span class="status-value" id="qCount">—</span>
        </div>
        <div class="status-row">
          <span class="status-label">Plan</span>
          <span class="status-value" id="planLabel">Free</span>
        </div>
      </div>
    </main>
  </div>

  <!-- SUBJECTS LIST SCREEN (NEW) -->
  <div id="subjectsScreen" class="screen">
    <header class="app-header">
      <button id="subjectsBackBtn" class="btn-icon">←</button>
      <div class="header-left" style="flex: 1; margin-left: 8px;">
        <h2>Subjects</h2>
        <span class="header-sub">Choose to practice</span>
      </div>
    </header>

    <main class="subjects-main">
      <div id="subjectsList" class="subjects-list">
        <!-- Subjects rendered here by app.js -->
      </div>
    </main>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quizScreen" class="screen">
    <header class="quiz-header">
      <button id="quizBackBtn" class="btn-icon">←</button>
      <div class="quiz-progress">
        <span id="quizProgress">0 / 0</span>
      </div>
      <button id="quizBookmarkBtn" class="btn-icon" title="Bookmark">☆</button>
    </header>

    <main class="quiz-main">
      <div class="quiz-meta">
        <span id="quizSubject">—</span>
        <span id="quizYear">—</span>
      </div>
      <h2 id="quizQuestion" class="quiz-question">Loading...</h2>
      <div id="quizOptions" class="quiz-options"></div>
      <div id="quizExplanation" class="quiz-explanation hidden">
        <h4>Explanation</h4>
        <p id="quizExplanationText"></p>
      </div>
    </main>

    <footer class="quiz-footer">
      <button id="quizPrevBtn" class="btn-secondary">Previous</button>
      <button id="quizNextBtn" class="btn-primary">Next</button>
    </footer>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <!-- Firebase + App scripts -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/db.js"></script>
  <script type="module" src="js/quiz.js"></script>
  <script type="module" src="js/subjects.js"></script>
  <script type="module" src="js/app.js"></script>

  <!-- Service worker for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
