<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Feedback Admin — AE/JE Civil</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;padding:16px;min-height:100vh}
    .container{max-width:960px;margin:0 auto}
    h1{color:#f59e0b;font-size:22px;margin-bottom:4px}
    .sub{color:#94a3b8;font-size:13px;margin-bottom:20px}
    a{color:#60a5fa;text-decoration:none;font-size:13px}
    .stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .stat{background:#1e293b;padding:12px 18px;border-radius:10px;text-align:center;border:1px solid #334155;flex:1;min-width:80px}
    .stat-num{font-size:24px;font-weight:700;color:#f59e0b}
    .stat-lbl{font-size:11px;color:#64748b;margin-top:2px}
    .stat-num.green{color:#10b981}
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .filter-btn{padding:7px 14px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer}
    .filter-btn.active{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,.08)}
    .fb-card{background:#1e293b;border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid #334155;border-left:4px solid #f59e0b}
    .fb-card.resolved{border-left-color:#10b981;opacity:.7}
    .fb-card.dismissed{border-left-color:#334155;opacity:.5}
    .fb-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;flex-wrap:wrap}
    .fb-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px}
    .badge-suggestion{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
    .badge-bug{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
    .badge-content{background:rgba(168,85,247,.15);color:#a855f7;border:1px solid rgba(168,85,247,.3)}
    .badge-praise{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)}
    .badge-other{background:rgba(100,116,139,.15);color:#94a3b8;border:1px solid #334155}
    .badge-new{background:rgba(245,158,11,.1);color:#f59e0b}
    .badge-resolved{background:rgba(16,185,129,.1);color:#10b981}
    .fb-meta{font-size:11px;color:#64748b;margin-bottom:6px}
    .fb-msg{font-size:13px;color:#e2e8f0;line-height:1.6;margin-bottom:10px;background:#0f172a;padding:12px;border-radius:8px}
    .fb-user{font-size:11px;color:#475569;margin-bottom:10px}
    .fb-actions{display:flex;gap:8px;flex-wrap:wrap}
    button{padding:8px 14px;border-radius:8px;border:none;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit}
    .btn-resolve{background:#10b981;color:#022c22}
    .btn-dismiss{background:#334155;color:#94a3b8}
    .btn-delete{background:#ef4444;color:#fff}
    .btn-login{background:#f59e0b;color:#1f2937;font-size:14px;padding:10px 24px}
    .login-wrap{text-align:center;padding:60px 20px}
    .login-wrap p{color:#94a3b8;margin-bottom:20px}
    .hidden{display:none!important}
    .empty{text-align:center;padding:40px;color:#475569;font-size:14px}
    .loading{text-align:center;padding:40px;color:#64748b}
  </style>
</head>
<body>
<div class="container">
  <h1>💬 Feedback Admin</h1>
  <p class="sub">User feedback & suggestions · <a href="reports-admin.html">Reports Admin →</a> · <a href="upload.html">Upload →</a></p>

  <!-- LOGIN -->
  <div id="loginPanel" class="login-wrap">
    <p>Sign in with admin account to view feedback.</p>
    <button class="btn-login" id="loginBtn">🔐 Login with Google</button>
  </div>

  <!-- MAIN -->
  <div id="mainPanel" class="hidden">
    <div class="stats" id="statsRow">
      <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">Total</div></div>
      <div class="stat"><div class="stat-num" id="statNew">0</div><div class="stat-lbl">New</div></div>
      <div class="stat"><div class="stat-num green" id="statResolved">0</div><div class="stat-lbl">Resolved</div></div>
    </div>

    <div class="filters" id="filtersRow">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="new">🆕 New</button>
      <button class="filter-btn" data-filter="suggestion">💡 Suggestions</button>
      <button class="filter-btn" data-filter="bug">🐛 Bugs</button>
      <button class="filter-btn" data-filter="content">📝 Content</button>
      <button class="filter-btn" data-filter="praise">⭐ Praise</button>
      <button class="filter-btn" data-filter="resolved">✅ Resolved</button>
    </div>

    <div id="feedbackList"><div class="loading">Loading feedback…</div></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, query, orderBy, getDocs, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyBJi1yjBwojb1cqcTdMwa53Rsb0Yzq7rMI",
    authDomain: "ae-exam-app.firebaseapp.com",
    projectId: "ae-exam-app",
    storageBucket: "ae-exam-app.firebasestorage.app",
    messagingSenderId: "101353507688",
    appId: "1:101353507688:web:82b31f2d6096387d7aa4dd"
  });
  const auth = getAuth(app);
  const db = getFirestore(app);
  const ADMIN = '112ce0489@gmail.com';

  let allFeedback = [];

  document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

  onAuthStateChanged(auth, user => {
    if (user && user.email === ADMIN) {
      document.getElementById('loginPanel').classList.add('hidden');
      document.getElementById('mainPanel').classList.remove('hidden');
      loadFeedback();
    } else {
      document.getElementById('loginPanel').classList.remove('hidden');
      document.getElementById('mainPanel').classList.add('hidden');
    }
  });

  async function loadFeedback() {
    const snap = await getDocs(query(collection(db, 'feedback'), orderBy('timestamp', 'desc')));
    allFeedback = [];
    snap.forEach(d => allFeedback.push({ id: d.id, ...d.data() }));
    updateStats();
    renderList('all');
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = allFeedback.length;
    document.getElementById('statNew').textContent = allFeedback.filter(f => f.status === 'new').length;
    document.getElementById('statResolved').textContent = allFeedback.filter(f => f.status === 'resolved').length;
  }

  function renderList(filter) {
    const list = document.getElementById('feedbackList');
    let items = allFeedback;
    if (filter === 'new') items = items.filter(f => f.status === 'new');
    else if (filter === 'resolved') items = items.filter(f => f.status === 'resolved');
    else if (filter !== 'all') items = items.filter(f => f.type === filter);

    if (!items.length) { list.innerHTML = '<div class="empty">No feedback found</div>'; return; }

    list.innerHTML = items.map(f => {
      const badgeClass = 'badge-' + (f.type || 'other');
      const cardClass = f.status === 'resolved' ? 'resolved' : f.status === 'dismissed' ? 'dismissed' : '';
      const ts = f.timestamp ? new Date(f.timestamp.seconds * 1000).toLocaleString('en-IN') : 'N/A';
      return `
        <div class="fb-card ${cardClass}">
          <div class="fb-top">
            <span class="fb-badge ${badgeClass}">${f.type || 'other'}</span>
            <span class="fb-meta">${ts}</span>
          </div>
          <div class="fb-msg">${escHtml(f.message || '')}</div>
          <div class="fb-user">👤 ${escHtml(f.user_email || 'anonymous')} ${f.user_name ? '(' + escHtml(f.user_name) + ')' : ''}</div>
          <div class="fb-actions">
            ${f.status !== 'resolved' ? `<button class="btn-resolve" onclick="resolveFB('${f.id}')">✅ Resolve</button>` : ''}
            ${f.status !== 'dismissed' ? `<button class="btn-dismiss" onclick="dismissFB('${f.id}')">🚫 Dismiss</button>` : ''}
            <button class="btn-delete" onclick="deleteFB('${f.id}')">🗑️ Delete</button>
          </div>
        </div>`;
    }).join('');
  }

  function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  window.resolveFB = async (id) => { await updateDoc(doc(db, 'feedback', id), { status: 'resolved' }); loadFeedback(); };
  window.dismissFB = async (id) => { await updateDoc(doc(db, 'feedback', id), { status: 'dismissed' }); loadFeedback(); };
  window.deleteFB = async (id) => { if (confirm('Delete this feedback permanently?')) { await deleteDoc(doc(db, 'feedback', id)); loadFeedback(); } };

  // Filter buttons
  document.getElementById('filtersRow').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList(btn.dataset.filter);
  });
</script>
</body>
</html>
