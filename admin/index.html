<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Panel — All AE/JE Civil Exams</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;height:100vh;display:flex;flex-direction:column;overflow:hidden}

    /* Top Nav */
    .admin-topbar{background:#1e293b;border-bottom:1px solid #334155;padding:0 12px;display:flex;align-items:center;gap:8px;height:52px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .admin-topbar::-webkit-scrollbar{height:0}
    .admin-logo{font-weight:800;font-size:15px;color:#f59e0b;white-space:nowrap;margin-right:8px}
    .tab-btn{padding:8px 16px;border-radius:8px;border:2px solid transparent;background:transparent;color:#64748b;font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
    .tab-btn:hover{color:#94a3b8;background:#0f172a}
    .tab-btn.active{color:#f59e0b;border-color:#f59e0b;background:rgba(245,158,11,.08)}
    .tab-btn .tab-icon{margin-right:4px}

    /* Badge */
    .tab-badge{display:inline-block;font-size:9px;background:#ef4444;color:#fff;border-radius:50%;width:16px;height:16px;line-height:16px;text-align:center;margin-left:4px;font-weight:700}

    /* Content Frame */
    .admin-content{flex:1;overflow:hidden;position:relative}
    .admin-content iframe{width:100%;height:100%;border:none;background:#0f172a}
    .admin-content .frame-wrap{position:absolute;inset:0;display:none}
    .admin-content .frame-wrap.active{display:block}

    /* Mobile responsive */
    @media(max-width:640px){
      .admin-logo{font-size:13px;margin-right:4px}
      .tab-btn{padding:7px 10px;font-size:11px}
    }
  </style>
</head>
<body>

  <!-- Top Navigation Tabs -->
  <nav class="admin-topbar">
    <div class="admin-logo">📋 Admin</div>
    <button class="tab-btn active" data-tab="upload"><span class="tab-icon">📤</span>Upload</button>
    <button class="tab-btn" data-tab="edit"><span class="tab-icon">✏️</span>Edit</button>
    <button class="tab-btn" data-tab="notes"><span class="tab-icon">📝</span>Notes</button>
    <button class="tab-btn" data-tab="users"><span class="tab-icon">👥</span>Users</button>
    <button class="tab-btn" data-tab="feedback"><span class="tab-icon">💬</span>Feedback</button>
    <button class="tab-btn" data-tab="reports"><span class="tab-icon">🚩</span>Reports</button>
  </nav>

  <!-- Content Area — each tab loads in iframe -->
  <div class="admin-content">
    <div class="frame-wrap active" id="frame-upload">
      <iframe src="upload.html" loading="eager"></iframe>
    </div>
    <div class="frame-wrap" id="frame-edit">
      <iframe src="edit-admin.html" loading="lazy"></iframe>
    </div>
    <div class="frame-wrap" id="frame-notes">
      <iframe src="notes-admin.html" loading="lazy"></iframe>
    </div>
    <div class="frame-wrap" id="frame-users">
      <iframe src="users-admin.html" loading="lazy"></iframe>
    </div>
    <div class="frame-wrap" id="frame-feedback">
      <iframe src="feedback-admin.html" loading="lazy"></iframe>
    </div>
    <div class="frame-wrap" id="frame-reports">
      <iframe src="reports-admin.html" loading="lazy"></iframe>
    </div>
  </div>

  <script>
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        // Remove active from all tabs
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Hide all frames, show selected
        document.querySelectorAll('.frame-wrap').forEach(f => f.classList.remove('active'));
        document.getElementById('frame-' + btn.dataset.tab).classList.add('active');
      });
    });
  </script>
</body>
</html>
